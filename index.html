<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self';
           style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
           font-src https://fonts.gstatic.com;
           script-src 'self' 'unsafe-inline';
           connect-src 'none';
           img-src 'none';
           frame-src 'none';">
<meta name="referrer" content="no-referrer">
<title>OG Google // AI-Free Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:      #00ff41;
  --green-dim:  #00cc33;
  --green-dark: #003b0d;
  --green-mid:  #007a1a;
  --red:        #ff4444;
  --bg:         #070707;
  --bg2:        #0f0f0f;
  --bg3:        #151515;
  --border:     rgba(0, 255, 65, 0.12);
  --border-mid: rgba(0, 255, 65, 0.25);
}

html, body { height: 100%; }

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--green);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* CRT scanlines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.08) 3px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* Vignette */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.65) 100%);
  pointer-events: none;
  z-index: 9998;
}

/* ── Header ──────────────────────────────────────────── */
.header {
  padding: 1rem 1.75rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 0.75rem;
}

.logo {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  color: var(--green-mid);
  text-transform: uppercase;
}
.logo em { color: var(--green); font-style: normal; }

.status-bar {
  display: flex;
  gap: 1.25rem;
  flex-wrap: wrap;
}

.status-item {
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  color: var(--green-mid);
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-on  { background: var(--green); animation: pulse 2.5s ease-in-out infinite; }
.dot-off { background: var(--red); }

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--green); }
  50%       { opacity: 0.35; box-shadow: none; }
}

/* ── Main ────────────────────────────────────────────── */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2.5rem 1.5rem;
  gap: 2.5rem;
}

/* ── Title ───────────────────────────────────────────── */
.title-section { text-align: center; }

.main-title {
  font-size: clamp(2.2rem, 6vw, 4rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 0.6rem;
  animation: flicker 0.6s ease-out both;
}
.main-title .dim  { color: var(--green-mid); }
.main-title .name { color: var(--green); }

.tagline {
  font-size: 0.65rem;
  color: var(--green-mid);
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.tagline .kill { color: var(--red); }

@keyframes flicker {
  0%   { opacity: 0.05; }
  15%  { opacity: 1; }
  17%  { opacity: 0.05; }
  25%  { opacity: 1; }
  100% { opacity: 1; }
}

/* ── Terminal window ─────────────────────────────────── */
.search-wrapper {
  width: 100%;
  max-width: 660px;
}

.terminal {
  border: 1px solid var(--border-mid);
  border-radius: 6px;
  overflow: hidden;
  background: var(--bg2);
  box-shadow: 0 0 40px rgba(0,255,65,0.04);
}

.t-bar {
  padding: 0.55rem 0.85rem;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.t-dots { display: flex; gap: 5px; }
.t-dot  { width: 10px; height: 10px; border-radius: 50%; }
.t-dot-r { background: #ff5f57; }
.t-dot-y { background: #febc2e; }
.t-dot-g { background: #28c840; }

.t-label {
  flex: 1;
  text-align: center;
  font-size: 0.6rem;
  color: var(--green-mid);
  letter-spacing: 0.12em;
}

.t-body {
  padding: 1.1rem 1rem 0.9rem;
}

.prompt-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.prompt-ps1 {
  color: var(--green-mid);
  font-size: 0.85rem;
  white-space: nowrap;
  user-select: none;
}

.search-input {
  flex: 1;
  min-width: 0;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  color: var(--green);
  caret-color: var(--green);
}
.search-input::placeholder  { color: rgba(0,255,65,0.2); }
.search-input::selection     { background: var(--green-dark); }

.t-footer {
  padding: 0.65rem 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.flag-info {
  flex: 1;
  font-size: 0.62rem;
  color: var(--green-mid);
  letter-spacing: 0.05em;
}
.flag-info .flag {
  display: inline-block;
  background: var(--green-dark);
  color: var(--green);
  border: 1px solid rgba(0,255,65,0.3);
  padding: 1px 6px;
  border-radius: 2px;
  font-size: 0.6rem;
  letter-spacing: 0.05em;
}

.search-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--bg);
  background: var(--green);
  border: none;
  padding: 0.45rem 1.1rem;
  border-radius: 2px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.12s, transform 0.08s;
}
.search-btn:hover  { background: var(--green-dim); }
.search-btn:active { transform: scale(0.96); }

/* ── Recent searches ──────────────────────────────────── */
.recent-section {
  width: 100%;
  max-width: 660px;
  display: none;
}

.recent-label {
  font-size: 0.58rem;
  color: rgba(0,255,65,0.25);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 0.55rem;
}

.recent-list { display: flex; flex-wrap: wrap; gap: 0.45rem; }

.recent-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--green-mid);
  background: transparent;
  border: 1px solid var(--border);
  padding: 0.2rem 0.55rem;
  border-radius: 2px;
  cursor: pointer;
  transition: color 0.12s, border-color 0.12s;
}
.recent-tag:hover { color: var(--green); border-color: var(--border-mid); }

/* ── Boot text ────────────────────────────────────────── */
.boot-text {
  font-size: 0.68rem;
  color: rgba(0,255,65,0.45);
  letter-spacing: 0.05em;
  min-height: 1.2em;
  text-align: center;
}

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
.cursor { display: inline-block; animation: blink 1s step-end infinite; }

/* ── Footer ───────────────────────────────────────────── */
footer {
  padding: 0.85rem 1.75rem;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5rem;
  font-size: 0.58rem;
  color: rgba(0,255,65,0.25);
  letter-spacing: 0.1em;
}

footer kbd {
  color: var(--green-mid);
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 1px 5px;
  border-radius: 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.58rem;
}

.clock { color: rgba(0,255,65,0.4); }

/* ── Responsive ───────────────────────────────────────── */
@media (max-width: 560px) {
  .header { padding: 0.85rem 1rem; }
  .main-title { font-size: 2rem; }
  footer { flex-direction: column; text-align: center; }
  .prompt-ps1 { font-size: 0.75rem; }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo"><em>OG</em> GOOGLE SEARCH</div>
  <div class="status-bar">
    <div class="status-item"><div class="dot dot-on"></div>ONLINE</div>
    <div class="status-item"><div class="dot dot-off"></div>AI_OVERVIEW: KILLED</div>
    <div class="status-item" id="count-display">0 SEARCHES TODAY</div>
  </div>
</header>

<main>
  <div class="title-section">
    <h1 class="main-title">
      <span class="dim">// </span><span class="name">OG GOOGLE</span>
    </h1>
    <p class="tagline">
      real results. no ai slop.&nbsp;
      <span class="kill">[ AI_OVERVIEW=0 ]</span>
    </p>
  </div>

  <div class="search-wrapper">
    <div class="terminal">
      <div class="t-bar">
        <div class="t-dots">
          <div class="t-dot t-dot-r"></div>
          <div class="t-dot t-dot-y"></div>
          <div class="t-dot t-dot-g"></div>
        </div>
        <div class="t-label">og-google — bash — 80×24</div>
      </div>
      <div class="t-body">
        <div class="prompt-row">
          <span class="prompt-ps1">user@og-google:~$</span>
          <input
            id="searchInput"
            class="search-input"
            type="text"
            placeholder="type your search..."
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            aria-label="Search query"
          >
        </div>
      </div>
      <div class="t-footer">
        <span class="flag-info">auto-appends <span class="flag">-ai</span> · opens Google in new tab</span>
        <button class="search-btn" id="searchBtn">EXECUTE ↵</button>
      </div>
    </div>
  </div>

  <div class="recent-section" id="recentSection">
    <div class="recent-label">// recent queries</div>
    <div class="recent-list" id="recentList"></div>
  </div>

  <div class="boot-text" id="bootText"></div>
</main>

<footer>
  <span>Press <kbd>/</kbd> to focus &nbsp;·&nbsp; <kbd>ESC</kbd> to clear</span>
  <span class="clock" id="clock"></span>
  <span>v1.0.0 &nbsp;·&nbsp; NO AI ZONE</span>
</footer>

<script>
(function () {
  'use strict';

  // ── Config ────────────────────────────────────────────────────
  const MAX_RECENT = 8;
  const STORAGE_KEY = 'og_recent_v1';
  const COUNT_KEY   = 'og_count_v1';
  const DATE_KEY    = 'og_date_v1';

  // ── DOM refs ──────────────────────────────────────────────────
  const input         = document.getElementById('searchInput');
  const bootText      = document.getElementById('bootText');
  const recentSection = document.getElementById('recentSection');
  const recentList    = document.getElementById('recentList');
  const countDisplay  = document.getElementById('count-display');
  const clockEl       = document.getElementById('clock');

  // ── Storage ───────────────────────────────────────────────────
  function safeGet(key, fallback) {
    try { return JSON.parse(localStorage.getItem(key) || fallback); }
    catch { return JSON.parse(fallback); }
  }

  function safeSet(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); }
    catch { /* storage unavailable */ }
  }

  function getRecent() { return safeGet(STORAGE_KEY, '[]'); }

  function saveRecent(query) {
    const list = getRecent().filter(function (q) { return q !== query; });
    list.unshift(query);
    safeSet(STORAGE_KEY, list.slice(0, MAX_RECENT));
  }

  function getDailyCount() {
    const today = new Date().toDateString();
    if (safeGet(DATE_KEY, '""') !== today) {
      safeSet(DATE_KEY, today);
      safeSet(COUNT_KEY, 0);
      return 0;
    }
    return safeGet(COUNT_KEY, '0');
  }

  function incrementCount() {
    const n = getDailyCount() + 1;
    safeSet(COUNT_KEY, n);
    return n;
  }

  // ── Search ────────────────────────────────────────────────────
  function doSearch() {
    const raw = input.value.trim();
    if (!raw) { input.focus(); return; }

    // Sanitise: strip any null bytes or control chars before encoding
    const cleaned = raw.replace(/[\x00-\x1F\x7F]/g, '');
    if (!cleaned) { input.focus(); return; }

    const withFlag = cleaned + ' -ai';
    const url = 'https://www.google.com/search?q=' + encodeURIComponent(withFlag);

    // noopener + noreferrer prevents the new tab accessing this page
    window.open(url, '_blank', 'noopener,noreferrer');

    saveRecent(cleaned);
    const n = incrementCount();
    updateCountDisplay(n);
    renderRecent();
  }

  // ── UI helpers ────────────────────────────────────────────────
  function updateCountDisplay(n) {
    countDisplay.textContent = n + ' SEARCH' + (n !== 1 ? 'ES' : '') + ' TODAY';
  }

  function renderRecent() {
    const list = getRecent();
    if (!list.length) { recentSection.style.display = 'none'; return; }
    recentSection.style.display = 'block';
    recentList.innerHTML = '';
    list.forEach(function (q) {
      const btn = document.createElement('button');
      btn.className = 'recent-tag';
      // Use textContent — never innerHTML — to prevent XSS
      btn.textContent = q;
      btn.setAttribute('aria-label', 'Search again: ' + q);
      btn.addEventListener('click', function () {
        input.value = q;
        doSearch();
      });
      recentList.appendChild(btn);
    });
  }

  // ── Clock ─────────────────────────────────────────────────────
  function updateClock() {
    clockEl.textContent = new Date().toLocaleTimeString('en-GB', { hour12: false });
  }

  // ── Events ────────────────────────────────────────────────────
  document.getElementById('searchBtn').addEventListener('click', doSearch);

  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); doSearch(); }
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === '/' && document.activeElement !== input) {
      e.preventDefault();
      input.focus();
      input.select();
    }
    if (e.key === 'Escape') {
      input.value = '';
      input.blur();
    }
  });

  // ── Boot sequence ─────────────────────────────────────────────
  const BOOT_MSGS = [
    'initialising og-google v1.0.0...',
    'loading search kernel... ok',
    'patching AI overview... blocked',
    'system ready.',
  ];

  (function boot() {
    var mi = 0, ci = 0;
    function tick() {
      if (mi >= BOOT_MSGS.length) {
        bootText.innerHTML = '<span class="cursor">_</span>';
        input.focus();
        return;
      }
      var msg = BOOT_MSGS[mi];
      if (ci <= msg.length) {
        bootText.textContent = msg.substring(0, ci);
        ci++;
        setTimeout(tick, ci === msg.length ? 700 : 22);
      } else {
        mi++; ci = 0;
        setTimeout(tick, 80);
      }
    }
    setTimeout(tick, 250);
  })();

  // ── Init ──────────────────────────────────────────────────────
  updateCountDisplay(getDailyCount());
  updateClock();
  setInterval(updateClock, 1000);
  renderRecent();
})();
</script>
</body>
</html>
